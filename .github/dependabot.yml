# Keeps dependencies and base images up to date via automated PRs.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Python backend
  - package-ecosystem: pip
    directory: /services
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    commit-message:
      prefix: chore(deps)

  # Frontend (npm)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: chore(deps)

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: chore(ci)

  # Base images in the Dockerfiles
  - package-ecosystem: docker
    directories:
      - /
      - /services
      - /frontend
    schedule:
      interval: weekly
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: chore(deps)
