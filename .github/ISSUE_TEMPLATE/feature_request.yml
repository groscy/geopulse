name: Feature request
description: Suggest an idea or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! For larger changes, consider opening an
        OpenSpec proposal (see [CONTRIBUTING.md](https://github.com/groscy/geopulse/blob/main/CONTRIBUTING.md#proposing-a-change)).
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Frontend (globe / UI)
        - API
        - Ingestion worker
        - Scoring engine
        - Database / migrations
        - Container / deployment
        - Docs
        - Other
    validations:
      required: true
