# GeoPulse all-in-one: serve the SPA and reverse-proxy the API on the same origin.
server {
    listen 80 default_server;
    server_name _;
    root /srv/geopulse;
    index index.html;

    # REST + Server-Sent-Events -> local FastAPI (uvicorn on 127.0.0.1:8000).
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (/api/stream): push events through immediately, keep the connection open.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # Hashed, immutable build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA client-side routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
